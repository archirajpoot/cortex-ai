spec_version: 1
name: customer_support_env
version: 1.0.0
description: >
  Real-world AI customer support decision-making environment.
  An RL agent triages customer complaints (billing, delivery, quality, technical, policy)
  over multi-step episodes with dynamic reward shaping, confidence calibration,
  budget constraints, and long-term strategy evaluation.
  Three difficulty levels: easy → medium → hard.
type: space
runtime: fastapi
app: server.app:app
port: 8000
tags:
  - openenv
  - customer-support
  - reinforcement-learning
  - multi-step
  - real-world

tasks:
  - id: easy
    name: Basic Triage
    description: Handle 1-2 clear-cut customer complaints per step.
    grader: baseline_agent.py
  - id: medium
    name: Operational Support
    description: Handle 2-3 ambiguous complaints per step over 4 steps.
    grader: baseline_agent.py
  - id: hard
    name: Enterprise Crisis Management
    description: Handle 3-5 high-stakes, ambiguous complaints over 5 steps.
    grader: baseline_agent.py
